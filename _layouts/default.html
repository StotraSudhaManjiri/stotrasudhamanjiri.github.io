<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <!-- Premium Marathi Fonts (Highly Optimized) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600&family=Tiro+Devanagari+Marathi&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Heritage Design System */
        :root { 
            --bg: #f8f5f2; 
            --surface: #ffffff;
            --text-main: #2c1e16; 
            --text-muted: #79685f;
            --accent: #c93d25; /* Kumkum Red */
            --accent-glow: rgba(201, 61, 37, 0.15);
            --border: #ebe6e0;
            --shadow-sm: 0 4px 6px -1px rgba(44, 30, 22, 0.05), 0 2px 4px -1px rgba(44, 30, 22, 0.03);
            --shadow-lg: 0 20px 25px -5px rgba(44, 30, 22, 0.08), 0 10px 10px -5px rgba(44, 30, 22, 0.04);
            --radius: 16px;
        }
        
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg: #120e0d; 
                --surface: #1e1816;
                --text-main: #f0e9e4; 
                --text-muted: #a39891;
                --accent: #e05339; 
                --accent-glow: rgba(224, 83, 57, 0.15);
                --border: #312622;
                --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            }
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Mukta', system-ui, sans-serif; 
            line-height: 1.6; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 0 1.5rem 4rem 1.5rem;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Premium Header / Hero Section */
        header { 
            text-align: center; 
            padding: 4rem 1rem 3rem; 
            margin-bottom: 2rem;
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background-color: var(--accent);
            border-radius: 3px;
        }
        h1 { 
            font-family: 'Tiro Devanagari Marathi', serif; 
            font-size: 2.8rem; 
            color: var(--accent);
            margin: 0 0 0.5rem 0; 
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; margin: 0; font-weight: 400; }
        
        /* Navigation (Breadcrumbs) */
        nav { 
            padding: 1.5rem 0;
            font-size: 1.05rem; 
            font-weight: 600;
        }
        a { color: var(--accent); text-decoration: none; transition: all 0.2s ease; }
        a:hover { color: var(--text-main); }
        
        h2 { 
            font-family: 'Tiro Devanagari Marathi', serif;
            font-size: 2rem; 
            font-weight: 400; 
            margin: 3rem 0 1.5rem 0;
        }

        /* The Devata Grid - Apple/Stripe level polish */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle glowing top border for cards */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--accent); opacity: 0; transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }
        .card:hover::before { opacity: 1; }

        .card-title { 
            font-family: 'Tiro Devanagari Marathi', serif; 
            font-size: 1.6rem; 
            color: var(--text-main); 
            margin-bottom: 0.3rem; 
        }
        .card-subtitle { font-size: 0.95rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Shloka List View */
        ul.list-view { 
            list-style: none; padding: 0; 
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        ul.list-view li { border-bottom: 1px solid var(--border); }
        ul.list-view li:last-child { border-bottom: none; }
        ul.list-view a { 
            display: flex; align-items: center;
            padding: 1.2rem 1.5rem; font-size: 1.25rem; 
            font-family: 'Tiro Devanagari Marathi', serif;
            color: var(--text-main);
            transition: background 0.2s ease;
        }
        ul.list-view a::before {
            content: "॥"; color: var(--accent); margin-right: 1rem; font-weight: bold; font-size: 1.5rem; opacity: 0.5;
        }
        ul.list-view a:hover { background: var(--accent-glow); color: var(--accent); }

        /* The Ultimate Reading Experience */
        .shloka-text { 
            font-family: 'Tiro Devanagari Marathi', serif;
            font-size: 1.6rem; 
            white-space: pre-wrap; 
            text-align: center; 
            margin: 2rem auto; 
            line-height: 2.4; 
            background-color: var(--surface);
            padding: 4rem 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            max-width: 750px;
            color: var(--text-main);
            position: relative;
        }
        
        /* Decorative manuscript corners for the reading view */
        .shloka-text::before, .shloka-text::after {
            content: "ॐ"; position: absolute; font-size: 2rem; color: var(--accent); opacity: 0.15;
        }
        .shloka-text::before { top: 1.5rem; left: 2rem; }
        .shloka-text::after { bottom: 1.5rem; right: 2rem; }
    </style>
</head>
<body>
    {{ content }}
</body>
</html>
