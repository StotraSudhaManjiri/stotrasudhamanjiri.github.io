<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        :root { --bg: #ffffff; --text: #222222; --link: #0033cc; --link-visited: #551a8b; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #121212; --text: #e0e0e0; --link: #66b3ff; --link-visited: #c792ea; }
        }
        body { background-color: var(--bg); color: var(--text); font-family: system-ui, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        h1, h2, h3 { border-bottom: 1px solid var(--text); padding-bottom: 0.5rem; }
        a { color: var(--link); text-decoration: none; }
        a:visited { color: var(--link-visited); }
        a:hover { text-decoration: underline; }
        ul.clean-list { list-style-type: none; padding: 0; }
        ul.clean-list li { margin-bottom: 0.5rem; }
        ul.clean-list li::before { content: "🕉 "; }
        nav { margin-bottom: 2rem; font-size: 0.9rem; }
        
        .shloka-text { font-size: 1.25rem; white-space: pre-wrap; text-align: center; margin-top: 2rem; line-height: 2; }
    </style>
</head>
<body>
    {{ content }}
</body>
</html>
