<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} · {{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="icon" href="{{ '/icon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
    <meta name="theme-color" content="#111111">
    <meta name="google-site-verification" content="4NjwjO6RAmI5YnVc7UZzTLMZt8Z01LDIbc1A226pW-Q" />
</head>
<body>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <p> 🌼 || श्रीसीतारामचंद्रार्पणमस्तु || 🌼 </p>
    </footer>

    <script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('{{ "/sw.js" | relative_url }}');
            });
        }
    </script>
</body>
</html>
