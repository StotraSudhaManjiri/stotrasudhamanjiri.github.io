<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        body { 
            font-family: sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 1rem; 
            color: #000; 
            background: #fff; 
            line-height: 1.5; 
        }
        @media (prefers-color-scheme: dark) { 
            body { color: #eee; background: #111; } 
            a { color: #8ab4f8; } 
            a:visited { color: #c58af9; } 
            hr { border-color: #444; }
        }
        a { color: #0000ee; text-decoration: none; }
        a:visited { color: #551a8b; }
        a:hover { text-decoration: underline; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 1rem 0; }
        
        /* Keeps the poem structure intact */
        .shloka-text { white-space: pre-wrap; font-size: 1.2rem; }
    </style>
</head>
<body>
    {{ content }}
</body>
</html>
