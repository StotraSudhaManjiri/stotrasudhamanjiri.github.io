---
layout: default
---
<a href="{{ '/' | relative_url }}">index</a>
<hr>

<h1>{{ page.title }}</h1>

{% assign related_shlokas = site.shlokas | where: "devata", page.title %}
<ul>
    {% for shloka in related_shlokas %}
    <li>
        <a href="{{ shloka.url | relative_url }}">{{ shloka.title }}</a>
    </li>
    {% endfor %}
</ul>
