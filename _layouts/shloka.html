---
layout: default
---
<a href="{{ '/' | relative_url }}">Index</a> / <a href="../">{{ page.devata }}</a>
<hr>

<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
    <h1 style="margin-top: 0;">{{ page.title }}</h1>
    <button id="save-btn" onclick="saveToCustomList()">🔖 Save to List</button>
</div>

<div class="shloka-text">
{{ content | replace: " ||", "&nbsp;||" | replace: " |", "&nbsp;|" | replace: " ॥", "&nbsp;॥" | replace: " ।", "&nbsp;।" }}
</div>

<script>
    const currentShloka = { 
        title: "{{ page.title }}", 
        url: "{{ page.url | relative_url }}" 
    };

    function saveToCustomList() {
        // Ask the user for a list name using native browser prompt
        let listName = prompt("Enter a list name to save this Shloka (e.g., Morning Pooja, Favorites):", "Favorites");
        
        // If they click cancel or enter nothing, abort
        if (!listName) return; 

        // Fetch existing lists or create an empty object
        let lists = JSON.parse(localStorage.getItem('custom_lists') || '{}');
        
        // If this list doesn't exist yet, create it
        if (!lists[listName]) {
            lists[listName] = [];
        }
        
        // Check if shloka is already in THIS specific list
        let exists = lists[listName].some(s => s.url === currentShloka.url);
        
        if (!exists) {
            lists[listName].push(currentShloka);
            localStorage.setItem('custom_lists', JSON.stringify(lists));
            alert(`✅ Saved to "${listName}"`);
        } else {
            alert(`⚠️ This shloka is already in "${listName}"`);
        }
    }
</script>
