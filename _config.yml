title: "|| स्तोत्रसुधामंजिरी ||"
description: "A minimalist, bloat-free collection of Shlokas and Stotras in Marathi."
theme: null
baseurl: ""
url: "https://stotrasudhamanjiri.github.io"

collections:
  devatas:
    output: true
  shlokas:
    output: true

# New content files get the right layout automatically —
# a new shloka/devata .md only needs title + devata front matter.
defaults:
  - scope:
      path: ""
      type: "shlokas"
    values:
      layout: "shloka"
  - scope:
      path: ""
      type: "devatas"
    values:
      layout: "devata"

plugins:
  - jekyll-sitemap
