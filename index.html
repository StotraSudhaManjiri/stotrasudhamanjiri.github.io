---
layout: default
title: मुखपृष्ठ (Home)
---
<header>
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
</header>

<main>
    <h2>देवता (Deities)</h2>
    
    <div class="grid">
        {% for devata in site.devatas %}
        <a href="{{ devata.url | relative_url }}" class="card">
            <span class="card-title">{{ devata.title }}</span>
            <span class="card-subtitle">{{ devata.english_title }}</span>
        </a>
        {% endfor %}
    </div>
</main>
